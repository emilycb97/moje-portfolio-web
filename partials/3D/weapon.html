<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Broń z Genshin Impact (3D) - Emilia Szczerba</title>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/style.css">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body class="subpage">

<div class="container">
    <a href="../../index.html?page=projects" class="btn-back">← Wróć do spisu projektów</a>

    <h1>Projekt: Broń Kinich'a (Genshin Impact)</h1>

    <div class="description">
        <p>Model 3D typu high-poly ze świata gry Genshin Impact. Projekt został wyrzeźbiony i zoptymalizowany w programie <strong>Blender</strong>. Poniżej znajduje się interaktywny podgląd wyeksportowanego modelu w formacie GLB.</p>
        <a href="weapon.glb" download class="btn-download">Pobierz model (.GLB)</a>
    </div>

    <div class="sketchfab-embed-wrapper" style="height: 600px; background: #111; border-radius: 8px; border: 1px solid #333; overflow: hidden;">
        <model-viewer
                src="weapon.glb"
                alt="Model 3D broni"
                camera-controls
                auto-rotate
                shadow-intensity="1"
                exposure="0.4"
                style="width: 100%; height: 100%;">
        </model-viewer>
    </div>
</div>

<script src="../../js/script.js"></script>

</body>
</html>
