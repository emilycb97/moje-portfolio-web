<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background-color: #050505; height: 100vh; overflow: hidden; }

        model-viewer {
            width: 100%;
            height: 100%;
            --poster-color: transparent;
        }

        .ar-button {
            background-color: #00ff66;
            border-radius: 4px;
            border: none;
            position: absolute;
            bottom: 16px;
            right: 16px;
            padding: 10px 20px;
            color: #050505;
            font-family: 'Oxanium', sans-serif;
            font-weight: bold;
            cursor: pointer;
            z-index: 100;
        }
    </style>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body>

<model-viewer
        src="weapon.glb"
        alt="Model 3D broni"
        camera-controls
        auto-rotate
        shadow-intensity="1"
        exposure="0.4"
        style="width: 100%; height: 100%;">
</model-viewer>

</body>
</html>
