<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Emilia Szczerba</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/png" href="assets/favicon.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>

<button class="lang-toggle" onclick="toggleLanguage()">EN</button>

<header class="hero">
    <div class="profile-pic">
        <img src="assets/czarno .jpg" alt="Zdjęcie profilowe Emilii">
    </div>
    <div class="hero-text">
        <h1>
            <span class="pl">Cześć, jestem</span>
            <span class="en">Hi, I'm</span>
            <span class="highlight">Emilia</span>
        </h1>
        <p class="pl">Łączę świat IT z grafiką komputerową i modelowaniem 3D.</p>
        <p class="en">I connect the IT world with computer graphics and 3D modeling.</p>
    </div>
</header>

<nav class="navbar">
    <button class="nav-btn active" onclick="showSection(event, 'about')">
        <span class="pl">O mnie</span>
        <span class="en">About me</span>
    </button>
    <button class="nav-btn" onclick="showSection(event, 'projects')">
        <span class="pl">Projekty</span>
        <span class="en">Projects</span>
    </button>
    <button class="nav-btn" onclick="showSection(event, 'contact')">
        <span class="pl">Kontakt</span>
        <span class="en">Contact</span>
    </button>
</nav>

<link rel="stylesheet" href="css/style.css">

<main>
    <section id="about" class="content-section active">
    </section>

    <section id="projects" class="content-section">
    </section>

    <section id="contact" class="content-section">
    </section>
</main>

<script src="js/script.js"></script>
</body>
</html>
